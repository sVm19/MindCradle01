name: Deploy Backend to Google Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GAR_LOCATION: ${{ secrets.GCP_GAR_LOCATION || 'us-central1' }}
  REPOSITORY: ${{ secrets.GCP_GAR_REPOSITORY || 'mindcradle' }}
  SERVICE: ${{ secrets.GCP_RUN_SERVICE || 'mindcradle-backend' }}
  REGION: ${{ secrets.GCP_RUN_REGION || 'us-central1' }}

jobs:
  test-and-deploy:
    name: Test and Deploy to Cloud Run
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio anyio httpx

      - name: Run Pytest
        run: |
          cd backend
          python -m pytest

      # Google Cloud Authentication
      # Method A: Workload Identity Federation (Recommended)
      - name: Authenticate via Workload Identity Federation
        id: auth-wif
        if: "${{ secrets.GCP_WIF_PROVIDER != '' }}"
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      # Method B: Service Account JSON Key (Fallback)
      - name: Authenticate via Service Account JSON Key
        id: auth-sa
        if: "${{ secrets.GCP_WIF_PROVIDER == '' }}"
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker Credential Helper
        run: |
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build and Push Docker Image
        run: |
          # Define image tag
          IMAGE_TAG="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }}"
          
          # Build Docker image
          docker build -t $IMAGE_TAG ./backend
          
          # Push Docker image to Artifact Registry
          docker push $IMAGE_TAG

      - name: Deploy to Google Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }}
          flags: '--allow-unauthenticated'
