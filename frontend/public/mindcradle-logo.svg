<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@700&amp;display=swap');
      .mc-icon-shape {
        stroke: #E94B6F;
        stroke-width: 5;
        fill: none;
        stroke-linejoin: round;
        stroke-linecap: round;
      }
      .mc-text {
        font-family: 'Caveat', 'Brush Script MT', cursive, sans-serif;
        font-size: 46px;
        font-weight: 700;
        fill: #0F1419;
      }
      @media (prefers-color-scheme: dark) {
        .mc-text {
          fill: #FFFFFF;
        }
      }
    </style>
  </defs>

  <g transform="translate(10, 0)">
    <!-- Icon Group -->
    <g transform="translate(10, 20)">
      <!-- Large Corner Cradle Shape -->
      <path class="mc-icon-shape" d="M 33,40 L 33,20 L 73,20 L 73,60 L 53,60 L 53,40 Z" />
      <!-- Small Nestled Square -->
      <rect class="mc-icon-shape" x="27" y="46" width="20" height="20" rx="2" />
    </g>

    <!-- Text -->
    <text class="mc-text" x="110" y="62">MindCradle</text>
  </g>
</svg>
