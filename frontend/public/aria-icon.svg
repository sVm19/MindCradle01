<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none">
  <defs>
    <!-- Vibrant Gradient for ARIA's cute body -->
    <linearGradient id="aria-body-grad" x1="4" y1="3" x2="20" y2="21" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a899ff" />
      <stop offset="50%" stop-color="#8b7cf8" />
      <stop offset="100%" stop-color="#f093a0" />
    </linearGradient>

    <!-- Soft Drop Shadow -->
    <filter id="aria-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#8b7cf8" flood-opacity="0.35" />
    </filter>
  </defs>

  <g filter="url(#aria-glow)">
    <!-- Cute Antennae / Ear Nubs -->
    <path d="M7 6.5 C5.2 3.8 6.5 2 8.5 3.2 L9.5 5.5 Z" fill="url(#aria-body-grad)" />
    <path d="M17 6.5 C18.8 3.8 17.5 2 15.5 3.2 L14.5 5.5 Z" fill="url(#aria-body-grad)" />

    <!-- Cute Main Body / Head Contour -->
    <path d="M12 4.5 C6.8 4.5 4 8.8 4 13.8 C4 18.2 7.6 21 12 21 C16.4 21 20 18.2 20 13.8 C20 8.8 17.2 4.5 12 4.5 Z" fill="url(#aria-body-grad)" />

    <!-- Cute Cheeks -->
    <circle cx="7.2" cy="14.5" r="1.4" fill="#ffffff" opacity="0.35" />
    <circle cx="16.8" cy="14.5" r="1.4" fill="#ffffff" opacity="0.35" />

    <!-- Expressive Happy Eyes -->
    <path d="M8 12.2 C8.8 10.8 10.2 10.8 11 12.2" stroke="#05020c" stroke-width="1.75" stroke-linecap="round" fill="none" />
    <path d="M13 12.2 C13.8 10.8 15.2 10.8 16 12.2" stroke="#05020c" stroke-width="1.75" stroke-linecap="round" fill="none" />

    <!-- Cute Gentle Smile -->
    <path d="M11 15 C11.6 15.9 12.4 15.9 13 15" stroke="#05020c" stroke-width="1.5" stroke-linecap="round" fill="none" />
  </g>
</svg>
