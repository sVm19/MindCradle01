<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@700&amp;display=swap');
      .mc-text-dark {
        font-family: 'Caveat', 'Brush Script MT', cursive, sans-serif;
        font-size: 46px;
        fill: #FFFFFF;
        font-weight: 700;
      }
      .mc-icon-shape {
        stroke: #E94B6F;
        stroke-width: 5.5;
        fill: none;
        stroke-linejoin: round;
        stroke-linecap: round;
      }
    </style>
  </defs>
  
  <!-- Icon Area: 60x60 centered vertically (y: 10 to 70), Center of icon is (40, 40) -->
  <g id="logo-icon">
    <!-- Large Corner Cradle Shape -->
    <path class="mc-icon-shape" d="M 23,37 L 23,17 L 63,17 L 63,57 L 43,57 L 43,37 Z" />
    <!-- Small Nestled Square -->
    <rect class="mc-icon-shape" x="17" y="43" width="20" height="20" rx="2" />
  </g>
  
  <!-- Spacing: 16px gap. Icon bounding box is 10 to 70. Text starts at x=86. Center aligned at y=54 -->
  <text class="mc-text-dark" x="86" y="54">MindCradle</text>
</svg>
